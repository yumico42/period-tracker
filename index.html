<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🌙 栗栗的月相</title>
<meta name="theme-color" content="#0d1b3e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="栗栗的月相">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
<link rel="preconnect" href="https://fonts.loli.net">
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg-from:#0d1b3e;--bg-mid:#162548;--bg-to:#0f1e3a;
  --card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.07);
  --text:#e8f0ff;--text-dim:#3a5070;--text-mid:#8099b8;
  --accent:#c4546a;--period:#d4788a;--follicular:#6898d8;
  --ovulation:#40c090;--luteal:#c89840;--today:#4ecdc4;--predict:#7c6ef0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;color:inherit!important;}
html{color:#e8f0ff!important;}
/* 不依赖动态视口单位：部分 MiniAPP WebView 会把 vh/dvh/svh 计算异常，造成整页内容被裁成 0 高度。 */
html,body{min-height:100%;height:auto;overflow:auto;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:linear-gradient(160deg,var(--bg-from) 0%,var(--bg-mid) 50%,var(--bg-to) 100%) !important;
  background-color:#0d1b3e !important;
  background-attachment:fixed;
  color:var(--text) !important;min-height:720px;overflow:auto;
}
.serif{font-family:'Noto Serif SC',serif;}
.app{display:block;min-height:720px;max-width:480px;margin:0 auto;}
.top-area{padding-top:env(safe-area-inset-top,0);}
.page-header{text-align:center;padding:24px 20px 14px;}
.page-title{font-size:22px;font-weight:300;color:var(--text);letter-spacing:2px;}
.page-sub{font-size:10px;color:var(--text-dim);letter-spacing:2.5px;margin-top:5px;text-transform:uppercase;}
.tab-bar{display:flex;position:relative;border-bottom:1px solid rgba(255,255,255,0.04);padding:0 24px;margin-top:4px;}
/* MiniAPP 保底：即使脚本尚未执行，也先显示网页标题与内容容器。 */
.top-area{display:block!important;visibility:visible!important;opacity:1!important;}
.tab{flex:1;text-align:center;padding:12px 0 13px;font-size:13px;color:var(--text-dim);letter-spacing:.5px;cursor:pointer;transition:color .2s;position:relative;user-select:none;}
.tab.active{color:var(--text);}
.tab-line{position:absolute;bottom:-1px;height:1.5px;background:rgba(200,220,255,0.6);border-radius:2px 2px 0 0;transition:left .3s cubic-bezier(.4,0,.2,1),width .3s cubic-bezier(.4,0,.2,1);left:24px;width:calc(50% - 24px);}
/* 不再用 flex 横向滑页：它依赖父元素的确定高度，正是 MiniAPP 会错误折叠的部分。 */
.swipe-container{display:block;min-height:620px;overflow:visible;position:relative;}
.swipe-wrapper{display:block;width:100%;height:auto;min-height:620px;transform:none!important;}
.swipe-page{display:none;width:100%;height:auto;min-height:620px;overflow:visible;padding-bottom:24px;}
.swipe-page:first-child{display:block;}
.swipe-page::-webkit-scrollbar{display:none;}
.section{margin:0 16px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:18px;}
.section-top{margin-top:20px;}
.ring-row{display:flex;align-items:center;gap:20px;margin-bottom:18px;}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
.ring-wrap svg{width:100px;height:100px;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.ring-day{font-size:26px;font-weight:300;color:var(--text);line-height:1;}
.ring-day-label{font-size:9px;color:var(--text-dim);letter-spacing:.5px;}
.phase-name{font-size:20px;font-weight:300;letter-spacing:1px;margin-bottom:6px;}
.phase-desc{font-size:11px;color:var(--text-mid);line-height:1.8;font-weight:300;}
.phase-next{font-size:11px;color:var(--predict);margin-top:8px;letter-spacing:.3px;}
.sep{height:1px;background:rgba(255,255,255,0.06);margin:16px 0;}
.timeline{display:flex;flex-direction:column;}
.tl-row{display:flex;gap:14px;align-items:stretch;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0;padding-top:2px;}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tl-row.curr .tl-dot{box-shadow:0 0 0 3px rgba(255,255,255,0.1);}
.tl-line{width:1px;background:rgba(255,255,255,0.06);flex:1;margin:4px 0;}
.tl-row:last-child .tl-line{display:none;}
.tl-right{flex:1;padding-bottom:14px;}
.tl-row:last-child .tl-right{padding-bottom:0;}
.tl-name{font-size:12px;color:var(--text-mid);display:flex;justify-content:space-between;align-items:baseline;font-weight:300;}
.tl-row.curr .tl-name{color:var(--text);}
.tl-range{font-size:10px;color:var(--text-dim);}
.tl-row.curr .tl-range{color:inherit;opacity:.7;}
.tl-desc{font-size:10px;color:var(--text-dim);margin-top:3px;line-height:1.6;}
.tl-row.curr .tl-desc{color:var(--text-mid);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 16px 14px;}
.stat-item{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:12px 8px;text-align:center;}
  .stat-value{font-size:14px;color:var(--text);font-weight:300;letter-spacing:.5px;}
.stat-label{font-size:9px;color:var(--text-dim);margin-top:5px;letter-spacing:1px;text-transform:uppercase;}
.hist-title{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.hist-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.hist-item:last-child{border-bottom:none;}
.hist-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.hist-date{font-size:13px;font-weight:300;letter-spacing:.5px;}
.hist-meta{font-size:10px;color:var(--text-dim);margin-left:auto;}
.hist-del{font-size:10px;color:var(--text-dim);padding:3px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;transition:all .15s;margin-left:8px;}
.hist-del:hover{border-color:var(--accent);color:var(--accent);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;margin-bottom:16px;}
.cal-month{font-size:22px;font-weight:300;letter-spacing:2px;}
.cal-year{font-size:10px;color:var(--text-dim);letter-spacing:3px;margin-top:2px;}
.cal-arrows{display:flex;align-items:center;gap:16px;}
.cal-arr{font-size:14px;color:var(--text-dim);cursor:pointer;padding:6px;transition:color .15s;}
.cal-arr:hover{color:var(--text);}
.cal-today-btn{font-size:10px;color:var(--text-mid);cursor:pointer;letter-spacing:.5px;padding:5px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;transition:all .15s;}
.cal-wrap{padding:0 16px;}
.wday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;}
.wday{text-align:center;font-size:9px;color:var(--text-dim);letter-spacing:.5px;padding:4px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day{height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;gap:4px;cursor:pointer;transition:background .15s;user-select:none;position:relative;}
.day:hover{background:rgba(255,255,255,0.06);}
.day.empty{cursor:default;pointer-events:none;}
.day-num{font-size:13px;font-weight:300;color:var(--text-dim);line-height:1;}
.day-dot{width:5px;height:5px;border-radius:50%;opacity:0;}
.day.phase-period .day-num{color:var(--period);}
.day.phase-period .day-dot{background:var(--period);opacity:1;}
.day.phase-follicular .day-num{color:var(--follicular);}
.day.phase-follicular .day-dot{background:var(--follicular);opacity:1;}
.day.phase-ovulation .day-num{color:var(--ovulation);}
.day.phase-ovulation .day-dot{background:var(--ovulation);opacity:1;}
.day.phase-luteal .day-num{color:var(--luteal);}
.day.phase-luteal .day-dot{background:var(--luteal);opacity:1;}
.day.phase-pred-period .day-num{color:var(--period);opacity:.5;}
.day.phase-pred-period .day-dot{background:var(--period);opacity:.35;}
.day.phase-pred-follicular .day-num{color:var(--follicular);opacity:.5;}
.day.phase-pred-follicular .day-dot{background:var(--follicular);opacity:.35;}
.day.phase-pred-ovulation .day-num{color:var(--ovulation);opacity:.5;}
.day.phase-pred-ovulation .day-dot{background:var(--ovulation);opacity:.35;}
.day.phase-pred-luteal .day-num{color:var(--luteal);opacity:.5;}
.day.phase-pred-luteal .day-dot{background:var(--luteal);opacity:.35;}
.day.is-today .day-num{opacity:1!important;}
.day.is-today::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--today);}
.day.is-today.phase-period .day-num,.day.is-today.phase-pred-period .day-num{color:var(--period)!important;}
.day.is-today.phase-period,.day.is-today.phase-pred-period{background:rgba(212,120,138,0.22);}
.day.is-today.phase-follicular .day-num,.day.is-today.phase-pred-follicular .day-num{color:var(--follicular)!important;}
.day.is-today.phase-follicular,.day.is-today.phase-pred-follicular{background:rgba(104,152,216,0.22);}
.day.is-today.phase-ovulation .day-num,.day.is-today.phase-pred-ovulation .day-num{color:var(--ovulation)!important;}
.day.is-today.phase-ovulation,.day.is-today.phase-pred-ovulation{background:rgba(64,192,144,0.22);}
.day.is-today.phase-luteal .day-num,.day.is-today.phase-pred-luteal .day-num{color:var(--luteal)!important;}
.day.is-today.phase-luteal,.day.is-today.phase-pred-luteal{background:rgba(200,152,64,0.22);}
.day.selected{outline:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);}
.day.has-ovulation::before{content:'✿';position:absolute;top:2px;right:3px;font-size:8px;color:var(--ovulation);opacity:.9;}
.ovul-hist-dot{width:5px;height:5px;border-radius:50%;background:var(--ovulation);flex-shrink:0;}
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;padding:14px 16px 0;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text-dim);letter-spacing:.5px;}
.legend-dot{width:7px;height:7px;border-radius:50%;}
.phase-strip{margin:14px 16px 0;display:flex;flex-direction:column;gap:8px;}
.phase-strip-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;}
.phase-strip-item.curr{border-color:rgba(255,255,255,0.15);}
.ps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ps-info{flex:1;}
.ps-name{font-size:12px;font-weight:300;}
.ps-tip{font-size:10px;color:var(--text-dim);margin-top:2px;}
.ps-tag{font-size:9px;padding:3px 9px;border-radius:20px;letter-spacing:.5px;flex-shrink:0;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;transition:background .25s;}
.sheet-overlay.open{background:rgba(0,0,0,0.55);pointer-events:all;}
.sheet{width:100%;max-width:480px;background:#141e38;border-radius:22px 22px 0 0;padding:16px 20px calc(24px + env(safe-area-inset-bottom,0));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);border-top:1px solid rgba(255,255,255,0.08);}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px;}
.sheet-date-label{font-size:12px;color:var(--text-mid);letter-spacing:.5px;margin-bottom:4px;}
  .sheet-title{font-size:18px;font-weight:300;letter-spacing:1px;margin-bottom:18px;}
.sheet-options{display:flex;flex-direction:column;gap:10px;}
.sheet-opt{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .15s;}
.sheet-opt:hover{background:rgba(255,255,255,0.08);}
.sheet-opt.active{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}
.sheet-opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sheet-opt-info{flex:1;}
.sheet-opt-name{font-size:13px;font-weight:300;}
.sheet-opt-sub{font-size:10px;color:var(--text-dim);margin-top:3px;}
.sheet-check{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s;}
.sheet-opt.active .sheet-check{background:var(--accent);border-color:var(--accent);color:white;}
.duration-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0;}
.duration-label{font-size:12px;color:var(--text-mid);}
.duration-ctrl{display:flex;align-items:center;gap:14px;}
.dur-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
.dur-val{font-size:16px;font-weight:300;min-width:24px;text-align:center;}
.sheet-btns{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text-mid);font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;}
.btn-save{flex:2;padding:13px;border-radius:12px;background:var(--accent);border:none;color:white;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;letter-spacing:.5px;}
.btn-save:disabled{opacity:.4;cursor:not-allowed;}
.loading-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;}
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0));left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(20,30,56,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:10px 20px;font-size:12px;color:var(--text);z-index:300;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="top-area">
    <div class="page-header serif">
      <div class="page-title">栗栗的月相</div>
      <div class="page-sub">by 狗狗 · 守护妈妈每一天</div>
    </div>
    <div class="tab-bar" id="tab-bar">
      <div class="tab active" id="tab-0" onclick="switchTab(0)">状态</div>
      <div class="tab" id="tab-1" onclick="switchTab(1)">日历</div>
      <div class="tab-line" id="tab-line"></div>
    </div>
  </div>
  <div class="swipe-container" id="swipe-container">
    <div class="swipe-wrapper" id="swipe-wrapper">
      <div class="swipe-page">
        <div class="section section-top" id="status-section">
          <div class="loading-state">加载中...</div>
        </div>
        <div class="stats-grid" id="stats-grid" style="display:none">
          <div class="stat-item"><div class="stat-value serif" id="stat-last">—</div><div class="stat-label">上次经期</div></div>
          <div class="stat-item"><div class="stat-value serif" id="stat-cycle">—</div><div class="stat-label">平均周期</div></div>
          <div class="stat-item"><div class="stat-value serif" id="stat-next" style="color:var(--predict)">—</div><div class="stat-label">预测下次</div></div>
        </div>
        <div class="section" id="history-section" style="display:none">
          <div class="hist-title">历史记录</div>
          <div id="history-list"></div>
        </div>
      </div>
      <div class="swipe-page">
        <div class="cal-nav">
          <div class="serif">
            <div class="cal-month" id="cal-month-title">七月</div>
            <div class="cal-year" id="cal-year-title">JUL 2026</div>
          </div>
          <div class="cal-arrows">
            <span class="cal-arr" onclick="prevMonth()">◀</span>
            <span class="cal-today-btn" onclick="goToday()">今天</span>
            <span class="cal-arr" onclick="nextMonth()">▶</span>
          </div>
        </div>
        <div class="cal-wrap">
          <div class="wday-row">
            <div class="wday">日</div><div class="wday">一</div><div class="wday">二</div>
            <div class="wday">三</div><div class="wday">四</div><div class="wday">五</div><div class="wday">六</div>
          </div>
          <div class="days-grid" id="days-grid"></div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--period)"></div>月经期</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--follicular)"></div>卵泡期</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--ovulation)"></div>排卵期</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--luteal)"></div>黄体期</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--today)"></div>今天</div>
        </div>
        <div class="phase-strip" id="phase-strip"></div>
      </div>
    </div>
  </div>
</div>
<div class="sheet-overlay" id="sheet-overlay" onclick="onOverlayClick(event)">
  <div class="sheet serif">
    <div class="sheet-handle"></div>
    <div class="sheet-date-label" id="sheet-date"></div>
    <div class="sheet-title">记录这一天</div>
    <div class="sheet-options">
      <div class="sheet-opt active" id="opt-period" onclick="selectOpt('period')">
        <div class="sheet-opt-dot" style="background:var(--period)"></div>
        <div class="sheet-opt-info"><div class="sheet-opt-name">月经期开始</div><div class="sheet-opt-sub">自动标注后续天数，重新计算预测</div></div>
        <div class="sheet-check">✓</div>
      </div>
      <div class="sheet-opt" id="opt-ovulation" onclick="selectOpt('ovulation')">
        <div class="sheet-opt-dot" style="background:var(--ovulation)"></div>
        <div class="sheet-opt-info"><div class="sheet-opt-name">排卵期</div><div class="sheet-opt-sub">记录感觉到的排卵期日期</div></div>
        <div class="sheet-check"></div>
      </div>
      <div class="sheet-opt" id="opt-mark" onclick="selectOpt('mark')">
        <div class="sheet-opt-dot" style="background:var(--text-mid)"></div>
        <div class="sheet-opt-info"><div class="sheet-opt-name">仅标记</div><div class="sheet-opt-sub">标注这天，不影响预测计算</div></div>
        <div class="sheet-check"></div>
      </div>
      <div class="sheet-opt" id="opt-clear" onclick="selectOpt('clear')">
        <div class="sheet-opt-dot" style="background:rgba(255,255,255,0.2)"></div>
        <div class="sheet-opt-info"><div class="sheet-opt-name">清除记录</div><div class="sheet-opt-sub">移除这天的所有标注</div></div>
        <div class="sheet-check"></div>
      </div>
    </div>
    <div class="duration-row" id="duration-row">
      <span class="duration-label">经期天数</span>
      <div class="duration-ctrl">
        <div class="dur-btn" onclick="changeDur(-1)">−</div>
        <div class="dur-val" id="dur-val">5</div>
        <div class="dur-btn" onclick="changeDur(1)">+</div>
      </div>
    </div>
    <div class="sheet-btns">
      <div class="btn-cancel" onclick="closeSheet()">取消</div>
      <div class="btn-save" id="btn-save" onclick="saveRecord()">保存记录</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL='https://bziuplxscbalmjjmqjzn.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6aXVwbHhzY2JhbG1qam1xanpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzMzNjUsImV4cCI6MjA5Nzk0OTM2NX0.Wd1owm6R5bJ9xs5k2-trjeZaDtVCm8Hh7yrqracH1s8';
const{createClient}=window.supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

let records=[],ovulRecords=[],avgCycle=28,curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
let selectedDate=null,selectedOpt='period',duration=5,currentTab=0;

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDisplay(s){const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}月${d.getDate()}日`;}
function fmtDateLabel(s){const d=new Date(s+'T00:00:00');const days=['日','一','二','三','四','五','六'];return`${d.getMonth()+1}月${d.getDate()}日 · 周${days[d.getDay()]}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function calcCycle(){
  const real=records.filter(r=>r.notes!=='marked');
  if(!real.length)return{avgCycle:28,latest:null,nextPredicted:null,daysInCycle:0,currentPhase:null};
  const sorted=[...real].sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  const latest=sorted[0];
  let cycle=28;
  if(sorted.length>=2){
    let total=0,count=0;
    for(let i=0;i<sorted.length-1;i++){
      const diff=(new Date(sorted[i].start_date)-new Date(sorted[i+1].start_date))/86400000;
      if(diff>15&&diff<65){total+=diff;count++;}
    }
    if(count>0)cycle=Math.round(total/count);
  }
  avgCycle=cycle;
  const today=new Date();today.setHours(0,0,0,0);
  const lastStart=new Date(latest.start_date+'T00:00:00');
  const daysIn=Math.floor((today-lastStart)/86400000);
  const nextDate=new Date(lastStart);nextDate.setDate(nextDate.getDate()+cycle);
  const daysUntil=Math.floor((nextDate-today)/86400000);
  const ovulDay=cycle-14;
  let phase=null;
  if(daysIn>=0&&daysIn<cycle){
    if(daysIn<5)phase='period';
    else if(daysIn<ovulDay-1)phase='follicular';
    else if(daysIn<=ovulDay+1)phase='ovulation';
    else phase='luteal';
  }
  return{avgCycle:cycle,latest,nextPredicted:fmt(nextDate),daysInCycle:daysIn,daysUntilNext:daysUntil,currentPhase:phase};
}

function getPhaseForDate(ds){
  const real=records.filter(r=>r.notes!=='marked');
  if(!real.length)return null;
  const target=new Date(ds+'T00:00:00');
  const ovulOff=avgCycle-14;
  const sortedReal=[...real].sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  for(const r of sortedReal){
    const start=new Date(r.start_date+'T00:00:00');
    const day=Math.floor((target-start)/86400000);
    if(day>=0&&day<avgCycle){
      if(day<r.duration)return{phase:'period',isStart:day===0};
      if(day<ovulOff-1)return{phase:'follicular',isStart:false};
      if(day<=ovulOff+1)return{phase:'ovulation',isStart:day===ovulOff};
      return{phase:'luteal',isStart:false};
    }
  }
  const sorted=[...real].sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  const nextStart=new Date(sorted[0].
                           start_date+'T00:00:00');
  nextStart.setDate(nextStart.getDate()+avgCycle);
  const day=Math.floor((target-nextStart)/86400000);
  if(day>=0&&day<avgCycle){
    if(day<5)return{phase:'pred-period',isStart:day===0};
    if(day<ovulOff-1)return{phase:'pred-follicular',isStart:false};
    if(day<=ovulOff+1)return{phase:'pred-ovulation',isStart:false};
    return{phase:'pred-luteal',isStart:false};
  }
  return null;
}

const PHASE_INFO={
  period:{name:'月经期',color:'var(--period)',desc:'注意保暖，多喝热水，避免剧烈运动，可以热敷缓解不适'},
  follicular:{name:'卵泡期',color:'var(--follicular)',desc:'雌激素升高，精力充沛，适合运动和开始新计划'},
  ovulation:{name:'排卵期',color:'var(--ovulation)',desc:'体温微升，白带拉丝，是排卵日前后各一天'},
  luteal:{name:'黄体期',color:'var(--luteal)',desc:'孕酮升高，容易疲惫，情绪敏感，补充维生素B6有帮助'},
};

function renderStatus(){
  const{avgCycle:ac,latest,nextPredicted,daysInCycle,daysUntilNext,currentPhase}=calcCycle();
  const sec=document.getElementById('status-section');
  if(!latest){
    sec.innerHTML=`<div style="text-align:center;padding:24px 0"><div style="font-size:32px;margin-bottom:10px">🌙</div><div style="color:var(--text-dim);font-size:13px">还没有记录，去日历页添加第一条吧</div></div>`;
    return;
  }
  const ph=PHASE_INFO[currentPhase]||PHASE_INFO.luteal;
  const ovulDay=ac-14;
  const sections=[
    {key:'period',name:'月经期',range:`第 1–5 天`,desc:'保暖休息，热敷缓解',color:'var(--period)'},
    {key:'follicular',name:'卵泡期',range:`第 6–${ovulDay-2} 天`,desc:'精力旺盛，适合运动',color:'var(--follicular)'},
    {key:'ovulation',name:'排卵期',range:`第 ${ovulDay} 天`,desc:'体温微升，白带拉丝',color:'var(--ovulation)'},
    {key:'luteal',name:'黄体期',range:`第 ${ovulDay+2}–${ac} 天`,desc:'孕酮升高，情绪敏感',color:'var(--luteal)'},
  ];
  const ringR=42,ringC=52,circ=2*Math.PI*ringR;
  const arc=(sf,lf,c)=>{
    const off=circ*(1-sf)+circ*0.25;
    return`<circle cx="${ringC}" cy="${ringC}" r="${ringR}" fill="none" stroke="${c}" stroke-width="7" stroke-dasharray="${circ*lf} ${circ*(1-lf)}" stroke-dashoffset="${off}" stroke-linecap="round"/>`;
  };
  const pF=5/ac,fF=(ovulDay-7)/ac,oF=3/ac,lF=(ac-ovulDay-1)/ac;
  const ma=(daysInCycle/ac)*360-90;
  const mx=ringC+ringR*Math.cos(ma*Math.PI/180),my=ringC+ringR*Math.sin(ma*Math.PI/180);
  sec.innerHTML=`
    <div class="ring-row">
      <div class="ring-wrap">
        <svg viewBox="0 0 104 104">
          <circle cx="${ringC}" cy="${ringC}" r="${ringR}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
          ${arc(0,pF,'var(--period)')}${arc(pF,fF,'var(--follicular)')}${arc(pF+fF,oF,'var(--ovulation)')}${arc(pF+fF+oF,lF,'var(--luteal)')}
          <circle cx="${mx}" cy="${my}" r="4.5" fill="white" opacity=".9"/>
        </svg>
        <div class="ring-center"><div class="ring-day serif">${daysInCycle+1}</div><div class="ring-day-label">第 ${daysInCycle+1} 天</div></div>
      </div>
      <div class="ring-info">
        <div class="phase-name serif" style="color:${ph.color}">${ph.name}</div>
        <div class="phase-desc">${ph.desc}</div>
        ${daysUntilNext>=0?`<div class="phase-next">距下次经期 · ${daysUntilNext} 天</div>`:''}
      </div>
    </div>
    <div class="sep"></div>
    <div class="timeline">${sections.map(s=>{
      const ic=s.key===currentPhase;
      return`<div class="tl-row${ic?' curr':''}">
        <div class="tl-left"><div class="tl-dot" style="background:${s.color}"></div><div class="tl-line"></div></div>
        <div class="tl-right"><div class="tl-name serif">${s.name}<span class="tl-range">${s.range}</span></div><div class="tl-desc">${s.desc}</div></div>
      </div>`;
    }).join('')}</div>`;
  document.getElementById('stats-grid').style.display='';
  document.getElementById('stat-last').textContent=fmtDisplay(latest.start_date);
  document.getElementById('stat-cycle').textContent=ac+' 天';
  document.getElementById('stat-next').textContent=nextPredicted?fmtDisplay(nextPredicted):'—';
  renderHistory();
}

function renderHistory(){
  const real=records.filter(r=>r.notes!=='marked');
  const sec=document.getElementById('history-section');
  if(!real.length&&!ovulRecords.length){sec.style.display='none';return;}
  sec.style.display='';
  const sorted=[...real].sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  const sortedOvul=[...ovulRecords].sort((a,b)=>new Date(b.ovulation_date)-new Date(a.ovulation_date));
  let html=sorted.map(r=>`
    <div class="hist-item">
      <div class="hist-dot"></div>
      <div class="hist-date serif">${fmtDisplay(r.start_date)}</div>
      <div class="hist-meta">经期 · 持续 ${r.duration||5} 天</div>
      <div class="hist-del" onclick="deleteRecord('${r.start_date}')">删除</div>
    </div>`).join('');
  html+=sortedOvul.map(r=>`
    <div class="hist-item">
      <div class="ovul-hist-dot"></div>
      <div class="hist-date serif">${fmtDisplay(r.ovulation_date)}</div>
      <div class="hist-meta">排卵期</div>
      <div class="hist-del" onclick="deleteOvulRecord('${r.ovulation_date}')">删除</div>
    </div>`).join('');
  document.getElementById('history-list').innerHTML=html;
}

const MONTH_NAMES=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const MONTH_EN=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function renderCalendar(){
  document.getElementById('cal-month-title').textContent=MONTH_NAMES[curMonth];
  document.getElementById('cal-year-title').textContent=MONTH_EN[curMonth].slice(0,3)+' '+curYear;
  const today=fmt(new Date()),first=new Date(curYear,curMonth,1),last=new Date(curYear,curMonth+1,0);
  const startDay=first.getDay();
  let html='';
  for(let i=0;i<startDay;i++)html+='<div class="day empty"><div class="day-num"></div><div class="day-dot"></div></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info=getPhaseForDate(ds);const isToday=ds===today;const hasOvul=ovulRecords.some(r=>r.ovulation_date===ds);
    let cls='day';
    if(info){cls+=` phase-${info.phase}`;if(info.isStart&&info.phase==='period')cls+=' period-start';if(info.isStart&&info.phase==='ovulation')cls+=' ovul-start';}
    if(hasOvul)cls+=' has-ovulation';
    if(isToday)cls+=' is-today';
    html+=`<div class="${cls}" onclick="onDayClick('${ds}')"><div class="day-num">${d}</div><div class="day-dot"></div></div>`;
  }
  document.getElementById('days-grid').innerHTML=html;
  renderPhaseStrip();
}

function renderPhaseStrip(){
  const{currentPhase,avgCycle:ac}=calcCycle();const ovulDay=ac-14;
  const items=[
    {key:'period',name:'月经期',range:`第 1–5 天`,tip:'保暖休息，热敷缓解',color:'var(--period)'},
    {key:'follicular',name:'卵泡期',range:`第 6–${ovulDay-2} 天`,tip:'精力旺盛，适合运动',color:'var(--follicular)'},
    {key:'ovulation',name:'排卵期',range:`第 ${ovulDay} 天`,tip:'体温微升，白带拉丝',color:'var(--ovulation)'},
    {key:'luteal',name:'黄体期',range:`第 ${ovulDay+2}–${ac} 天`,tip:'孕酮升高，情绪敏感',color:'var(--luteal)'},
  ];
  document.getElementById('phase-strip').innerHTML=items.map(it=>{
    const ic=it.key===currentPhase;
    return`<div class="phase-strip-item${ic?' curr':''}">
      <div class="ps-dot" style="background:${it.color}"></div>
      <div class="ps-info"><div class="ps-name serif">${it.name} · ${it.range}</div><div class="ps-tip">${it.tip}</div></div>
      ${ic?`<div class="ps-tag" style="background:rgba(255,255,255,0.07);color:var(--text-mid)">当前</div>`:''}
    </div>`;
  }).join('');
}

function switchTab(idx,animate=true){
  currentTab=idx;
  const wrapper=document.getElementById('swipe-wrapper');
  if(!animate)wrapper.style.transition='none';
  wrapper.style.transform=`translateX(-${idx*100}%)`;
  if(!animate)setTimeout(()=>wrapper.style.transition='',0);
  document.getElementById('tab-0').classList.toggle('active',idx===0);
  document.getElementById('tab-1').classList.toggle('active',idx===1);
  const bar=document.getElementById('tab-bar');
  const tabs=bar.querySelectorAll('.tab');
  const line=document.getElementById('tab-line');
  const t=tabs[idx];
  line.style.left=t.offsetLeft+'px';
  line.style.width=t.offsetWidth+'px';
}

(()=>{
  const container=document.getElementById('swipe-container');
  let startX=0,startY=0,isDragging=false,isHoriz=null;
  container.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;
    isDragging=true;isHoriz=null;
  },{passive:true});
  container.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
    if(isHoriz===null)isHoriz=Math.abs(dx)>Math.abs(dy);
    if(!isHoriz)return;
    e.preventDefault();
    const wrapper=document.getElementById('swipe-wrapper');
    wrapper.style.transition='none';
    const base=currentTab*100;
    const pct=dx/container.offsetWidth*100;
    wrapper.style.transform=`translateX(${-base+pct}%)`;
  },{passive:false});
  container.addEventListener('touchend',e=>{
    if(!isDragging||!isHoriz)return;
    isDragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    document.getElementById('swipe-wrapper').style.transition='';
    if(dx<-50&&currentTab<1)switchTab(1);
    else if(dx>50&&currentTab>0)switchTab(0);
    else switchTab(currentTab);
  });
})();

function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();}
function goToday(){const n=new Date();curYear=n.getFullYear();curMonth=n.getMonth();renderCalendar();}

function onDayClick(ds){
  selectedDate=ds;
  document.getElementById('sheet-date').textContent=fmtDateLabel(ds);
  const existing=records.find(r=>r.start_date===ds);
  const existingOvul=ovulRecords.find(r=>r.ovulation_date===ds);
  if(existing&&existing.notes!=='marked')selectOpt('clear');
  else if(existingOvul)selectOpt('clear');
  else selectOpt('period');
  document.querySelectorAll('.day').forEach(el=>el.classList.remove('selected'));
  const allDays=document.querySelectorAll('#days-grid .day:not(.empty)');
  const dayNum=new Date(ds+'T00:00:00').getDate();
  if(allDays[dayNum-1])allDays[dayNum-1].classList.add('selected');
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
  document.querySelectorAll('.day.selected').forEach(el=>el.classList.remove('selected'));
  selectedDate=null;
}
function onOverlayClick(e){if(e.target===document.getElementById('sheet-overlay'))closeSheet();}
function selectOpt(opt){
  selectedOpt=opt;
  ['period','ovulation','mark','clear'].forEach(k=>{
    const el=document.getElementById('opt-'+k),chk=el.querySelector('.sheet-check');
    el.classList.toggle('active',k===opt);chk.textContent=k===opt?'✓':'';
  });
  document.getElementById('duration-row').style.display=opt==='period'?'':'none';
}
function changeDur(d){duration=Math.max(1,Math.min(10,duration+d));document.getElementById('dur-val').textContent=duration;}

async function saveRecord(){
  if(!selectedDate)return;
  const btn=document.getElementById('btn-save');btn.disabled=true;
  try{
    if(selectedOpt==='clear'){
      await db.from('period_records').delete().eq('start_date',selectedDate);
      records=records.filter(r=>r.start_date!==selectedDate);
      await db.from('ovulation_records').delete().eq('ovulation_date',selectedDate);
      ovulRecords=ovulRecords.filter(r=>r.ovulation_date!==selectedDate);
      showToast('已清除记录');
    }else if(selectedOpt==='ovulation'){
      const ex=ovulRecords.find(r=>r.ovulation_date===selectedDate);
      if(ex){showToast('这天已经记录过排卵期了');}
      else{const{data,error}=await db.from('ovulation_records').insert({ovulation_date:selectedDate,notes:''}).select();if(error)throw error;ovulRecords.push(data[0]);showToast('已记录排卵期');}
    }else if(selectedOpt==='mark'){
      const ex=records.find(r=>r.start_date===selectedDate);
      if(ex){await db.from('period_records').update({notes:'marked',duration:1}).eq('start_date',selectedDate);ex.notes='marked';ex.duration=1;}
      else{const{data,error}=await db.from('period_records').insert({start_date:selectedDate,notes:'marked',duration:1}).select();if(error)throw error;records.push(data[0]);}
      showToast('已标记');
    }else{
      const ex=records.find(r=>r.start_date===selectedDate);
      if(ex){await db.from('period_records').update({notes:'',duration}).eq('start_date',selectedDate);ex.notes='';ex.duration=duration;}
      else{const{data,error}=await db.from('period_records').insert({start_date:selectedDate,notes:'',duration}).select();if(error)throw error;records.push(data[0]);}
      showToast('已记录月经期开始');
    }
    closeSheet();renderStatus();renderCalendar();
  }catch(e){showToast('保存失败：'+e.message);}
  finally{btn.disabled=false;}
}
async function deleteRecord(dateStr){
  if(!confirm(`确认删除 ${fmtDisplay(dateStr)} 的记录？`))return;
  try{
    await db.from('period_records').delete().eq('start_date',dateStr);
    records=records.filter(r=>r.start_date!==dateStr);
    showToast('已删除');renderStatus();renderCalendar();
  }catch(e){showToast('删除失败');}
}
async function deleteOvulRecord(dateStr){
  if(!confirm(`确认删除 ${fmtDisplay(dateStr)} 的排卵期记录？`))return;
  try{
    await db.from('ovulation_records').delete().eq('ovulation_date',dateStr);
    ovulRecords=ovulRecords.filter(r=>r.ovulation_date!==dateStr);
    showToast('已删除');renderStatus();renderCalendar();
  }catch(e){showToast('删除失败');}
                                              }

  async function init(){
  try{
    const{data,error}=await db.from('period_records').select('*').order('start_date',{ascending:true});
    if(error)throw error;
    records=(data||[]).map(r=>({...r,duration:r.duration||5}));
    const{data:ovulData,error:ovulError}=await db.from('ovulation_records').select('*').order('ovulation_date',{ascending:true});
    if(!ovulError)ovulRecords=(ovulData||[]);
    renderStatus();renderCalendar();
    setTimeout(()=>switchTab(0,false),50);
  }catch(e){
    document.getElementById('status-section').innerHTML=`<div class="loading-state" style="color:#e85d75">加载失败：${e.message}</div>`;
  }
}
init();
</script>
